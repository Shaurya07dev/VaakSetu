version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: vaaksetu_redis
    ports:
      - "6379:6379"
    restart: unless-stopped

  postgres:
    image: ankane/pgvector
    container_name: vaaksetu_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vaaksetu
      POSTGRES_DB: vaaksetu
    ports:
      - "5432:5432"
    volumes:
      - vaaksetu_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

volumes:
  vaaksetu_pgdata: