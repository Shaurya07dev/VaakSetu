# version: '3.8'

services:

  redis:
    image: redis:7-alpine
    container_name: vaaksetu_redis
    ports:
      - "6379:6379"
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 10s
      timeout: 3s
      retries: 3

  postgres:
    image: ankane/pgvector
    container_name: vaaksetu_postgres
    environment:
      POSTGRES_USER: postgres
      POSTGRES_PASSWORD: vaaksetu
      POSTGRES_DB: vaaksetu
    ports:
      - "5432:5432"
    volumes:
      - vaaksetu_pgdata:/var/lib/postgresql/data
    restart: unless-stopped

  # ngrok tunnel — exposes your local backend to the internet
  # so Twilio can reach your webhooks and WebSocket endpoints.
  # Set NGROK_AUTHTOKEN in your .env file.
  ngrok:
    image: ngrok/ngrok:latest
    container_name: vaaksetu_ngrok
    environment:
      - NGROK_AUTHTOKEN=${NGROK_AUTHTOKEN}
    command: http host.docker.internal:8000
    ports:
      - "4040:4040"    # ngrok inspection UI
    restart: unless-stopped
    extra_hosts:
      - "host.docker.internal:host-gateway"

volumes:
  vaaksetu_pgdata: